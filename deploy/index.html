<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Yantia — descubre tu paladar</title>
  <meta name="description" content="Cata ingredientes al estilo swipe, encuentra recetas que encajan contigo, planifica tu semana y genera la lista de la compra." />
  <meta name="theme-color" content="#E8532C" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Yantia" />
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?deps=react@18.3.1"
    }
  }
  </script>
  <style>html,body{margin:0;height:100%;background:#F5F3EE}#root{height:100%}</style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    window.storage = {
      async get(k) { const v = localStorage.getItem(k); return v == null ? null : { key: k, value: v }; },
      async set(k, v) { localStorage.setItem(k, v); return { key: k, value: v }; },
    };
    (async () => {
      try {
        const { createRoot } = await import("react-dom/client");
        const App = (await import("./app.js")).default;
        const root = createRoot(document.getElementById("root"));
        root.render(App ? App() : null);
      } catch (e) {
        console.error("App error:", e);
        document.getElementById("root").innerHTML = `<div style="padding:20px;color:red;font-family:monospace;white-space:pre-wrap">${e.message}\n\n${e.stack}</div>`;
      }
    })();
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
